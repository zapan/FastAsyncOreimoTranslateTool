# This workflow will build a .NET project and create releases for macOS and Windows
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Build & Release

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.7
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Test
        run: dotnet test --no-build --verbosity normal

  build-macos:
    runs-on: macos-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4.1.7
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Install dependencies
        run: |
          brew install cdrtools
      - name: Make scripts executable
        run: |
          if [ -f Resources/!!Tools/DatWorker/gzip ]; then
            chmod +x Resources/!!Tools/DatWorker/gzip
          fi
      - name: Restore dependencies
        run: dotnet restore
      - name: Publish CLI for macOS (x64)
        run: dotnet publish OreimoTranslateToolCLI -c Release -r osx-x64 -o ./build/OreimoTranslateTool-macOS-x64 --self-contained
      - name: Publish CLI for macOS (ARM64)
        run: dotnet publish OreimoTranslateToolCLI -c Release -r osx-arm64 -o ./build/OreimoTranslateTool-macOS-ARM64 --self-contained
      - name: Publish GUI for macOS (x64)
        run: dotnet publish OreimoTranslateToolAvalonia -c Release -r osx-x64 -o ./build/OreimoTranslateTool-macOS-x64/GUI --self-contained
      - name: Publish GUI for macOS (ARM64)
        run: dotnet publish OreimoTranslateToolAvalonia -c Release -r osx-arm64 -o ./build/OreimoTranslateTool-macOS-ARM64/GUI --self-contained
      - name: Copy assets to macOS x64 build
        run: |
          mkdir -p ./build/OreimoTranslateTool-macOS-x64/Assets
          mkdir -p ./build/OreimoTranslateTool-macOS-x64/Data
          cp -r OreimoTranslateToolAvalonia/Assets/* ./build/OreimoTranslateTool-macOS-x64/Assets/
          cp Data/Translation.json ./build/OreimoTranslateTool-macOS-x64/Data/
      - name: Copy assets to macOS ARM64 build
        run: |
          mkdir -p ./build/OreimoTranslateTool-macOS-ARM64/Assets
          mkdir -p ./build/OreimoTranslateTool-macOS-ARM64/Data
          cp -r OreimoTranslateToolAvalonia/Assets/* ./build/OreimoTranslateTool-macOS-ARM64/Assets/
          cp Data/Translation.json ./build/OreimoTranslateTool-macOS-ARM64/Data/
      - name: Create macOS bundles
        run: |
          mkdir -p ./releases
          cd ./build
          tar -czf ../releases/OreimoTranslateTool-macOS-x64.tar.gz OreimoTranslateTool-macOS-x64/
          tar -czf ../releases/OreimoTranslateTool-macOS-ARM64.tar.gz OreimoTranslateTool-macOS-ARM64/
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: releases/

  build-windows:
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4.1.7
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Publish CLI for Windows (x64)
        run: dotnet publish OreimoTranslateToolCLI -c Release -r win-x64 -o ./build/OreimoTranslateTool-Windows-x64 --self-contained
      - name: Publish CLI for Windows (ARM64)
        run: dotnet publish OreimoTranslateToolCLI -c Release -r win-arm64 -o ./build/OreimoTranslateTool-Windows-ARM64 --self-contained
      - name: Publish GUI for Windows (x64)
        run: dotnet publish OreimoTranslateToolAvalonia -c Release -r win-x64 -o ./build/OreimoTranslateTool-Windows-x64/GUI --self-contained
      - name: Publish GUI for Windows (ARM64)
        run: dotnet publish OreimoTranslateToolAvalonia -c Release -r win-arm64 -o ./build/OreimoTranslateTool-Windows-ARM64/GUI --self-contained
      - name: Copy assets to Windows x64 build
        run: |
          New-Item -ItemType Directory -Force -Path ./build/OreimoTranslateTool-Windows-x64/Assets
          New-Item -ItemType Directory -Force -Path ./build/OreimoTranslateTool-Windows-x64/Data
          Copy-Item -Recurse OreimoTranslateToolAvalonia/Assets/* ./build/OreimoTranslateTool-Windows-x64/Assets/
          Copy-Item Data/Translation.json ./build/OreimoTranslateTool-Windows-x64/Data/
      - name: Copy assets to Windows ARM64 build
        run: |
          New-Item -ItemType Directory -Force -Path ./build/OreimoTranslateTool-Windows-ARM64/Assets
          New-Item -ItemType Directory -Force -Path ./build/OreimoTranslateTool-Windows-ARM64/Data
          Copy-Item -Recurse OreimoTranslateToolAvalonia/Assets/* ./build/OreimoTranslateTool-Windows-ARM64/Assets/
          Copy-Item Data/Translation.json ./build/OreimoTranslateTool-Windows-ARM64/Data/
      - name: Create Windows packages
        run: |
          New-Item -ItemType Directory -Force -Path releases
          cd build
          powershell -Command "Compress-Archive -Path OreimoTranslateTool-Windows-x64 -DestinationPath ../releases/OreimoTranslateTool-Windows-x64.zip"
          powershell -Command "Compress-Archive -Path OreimoTranslateTool-Windows-ARM64 -DestinationPath ../releases/OreimoTranslateTool-Windows-ARM64.zip"
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: releases/

  create-release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.1.7
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
      - name: Create Release
        uses: softprops/action-gh-release@v2.0.4
        with:
          files: |
            macos-binaries/*
            windows-binaries/*
          body_path: CHANGES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
