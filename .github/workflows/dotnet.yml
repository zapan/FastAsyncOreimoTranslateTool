# This workflow will build a .NET project and create releases for macOS and Windows
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Build & Release

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Test
        run: dotnet test --no-build --verbosity normal

  build-macos:
    runs-on: macos-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Install dependencies
        run: |
          brew install cdrtools
      - name: Make scripts executable
        run: |
          if [ -f Resources/!!Tools/DatWorker/gzip ]; then
            chmod +x Resources/!!Tools/DatWorker/gzip
          fi
          chmod +x create-macos-app-bundle.sh
      - name: Restore dependencies
        run: dotnet restore
      - name: Publish solution for macOS (x64)
        run: dotnet publish -c Release -r osx-x64 -o ./build/OreimoTranslateTool-macOS-x64 --self-contained 2>&1 | grep "OreimoTranslateTool ->\|OreimoTranslateToolCLI ->"
      - name: Publish solution for macOS (ARM64)
        run: dotnet publish -c Release -r osx-arm64 -o ./build/OreimoTranslateTool-macOS-ARM64 --self-contained 2>&1 | grep "OreimoTranslateTool ->\|OreimoTranslateToolCLI ->"
      - name: Create .app bundles for macOS x64
        run: bash ./create-macos-app-bundle.sh ./build/OreimoTranslateTool-macOS-x64 x64
      - name: Create .app bundles for macOS ARM64
        run: bash ./create-macos-app-bundle.sh ./build/OreimoTranslateTool-macOS-ARM64 ARM64

      - name: Instalar create-dmg
        run: brew install create-dmg

      - name: Crear archivos DMG
        run: |
          mkdir -p ./releases
          rm -f "./releases/*.dmg"  

      - name: Crear archivo DMG ARM64
        run: |
          create-dmg \
            --volname "Oreimo Translate Tool" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "OreimoTranslateTool.app" 175 120 \
            --hide-extension "OreimoTranslateTool.app" \
            --app-drop-link 425 120 \
            "./releases/OreimoTranslateTool-macOS-ARM64.dmg" \
            "./build/OreimoTranslateTool-macOS-ARM64/OreimoTranslateTool.app"

      - name: Crear archivo DMG x64
        run: |
          create-dmg \
            --volname "Oreimo Translate Tool" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "OreimoTranslateTool.app" 175 120 \
            --hide-extension "OreimoTranslateTool.app" \
            --app-drop-link 425 120 \
            "./releases/OreimoTranslateTool-macOS-x64.dmg" \
            "./build/OreimoTranslateTool-macOS-x64/OreimoTranslateTool.app"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: releases/

  build-windows:
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Restore dependencies
        run: dotnet restore
        
      - name: Publish CLI for Windows (x64)
        run: dotnet publish OreimoTranslateToolCLI -c Release -r win-x64 -o ./build/OreimoTranslateTool-Windows-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Publish GUI for Windows (x64)
        run: dotnet publish OreimoTranslateTool -c Release -r win-x64 -o ./build/OreimoTranslateTool-Windows-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
      
      - name: Publish CLI for Windows (ARM64)
        run: dotnet publish OreimoTranslateToolCLI -c Release -r win-arm64 -o ./build/OreimoTranslateTool-Windows-ARM64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
        
      - name: Publish GUI for Windows (ARM64)
        run: dotnet publish OreimoTranslateTool -c Release -r win-arm64 -o ./build/OreimoTranslateTool-Windows-ARM64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Copy assets to Windows x64 build
        run: |
          Copy-Item RyuujiApi/Resources/StartGame.Windows.conf ./build/OreimoTranslateTool-Windows-x64/Resources/StartGame.conf
          
      - name: Copy assets to Windows ARM64 build
        run: |
          Copy-Item RyuujiApi/Resources/StartGame.Windows.conf ./build/OreimoTranslateTool-Windows-ARM64/Resources/StartGame.conf
      
      - name: Create Windows packages
        run: |
          New-Item -ItemType Directory -Force -Path releases
          cd build
          powershell -Command "Compress-Archive -Path OreimoTranslateTool-Windows-x64   -DestinationPath ../releases/OreimoTranslateTool-Windows-x64.zip"
          powershell -Command "Compress-Archive -Path OreimoTranslateTool-Windows-ARM64 -DestinationPath ../releases/OreimoTranslateTool-Windows-ARM64.zip"
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: releases/

  create-release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
      - name: Create Release
        uses: softprops/action-gh-release@v2.0.4
        with:
          files: |
            macos-binaries/*
            windows-binaries/*
          body_path: CHANGES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
